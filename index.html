<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Team ISR" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Team ISR</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A5%3C/text%3E%3C/svg%3E" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f2f2f7;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #root {
      min-height: 100vh;
    }
    /* Initial loader shown before React mounts */
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      z-index: 9999;
    }
    #initial-loader .icon { font-size: 44px; }
    #initial-loader .title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
    }
    #initial-loader .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
    /* Hide loader once React has mounted something into #root */
    #root:not(:empty) + #initial-loader { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="initial-loader">
    <div class="icon">🏥</div>
    <div class="title">Team ISR</div>
    <div class="sub">Loading...</div>
  </div>

  <!-- React 18 (UMD globals: React, ReactDOM) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Application -->
  <script src="/app.js"></script>
</body>
</html>
